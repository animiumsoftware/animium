<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haberler - Animium</title>
    <link rel="preconnect" href="[fonts.googleapis.com](https://fonts.googleapis.com)">
    <link rel="preconnect" href="[fonts.gstatic.com](https://fonts.gstatic.com)" crossorigin>
    <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Righteous&family=Poppins:wght@300;400;500;600;700&display=swap)" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar scrolled" id="navbar">
        <button class="hamburger" id="hamburgerBtn" aria-label="Menü">
            <span></span>
            <span></span>
            <span></span>
        </button>
        
        <a href="index.html" class="logo">ANIMIUM</a>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Ara...">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
            </svg>
        </div>
    </nav>

    <!-- Hamburger Menü -->
    <div class="menu-overlay" id="menuOverlay"></div>
    <aside class="side-menu" id="sideMenu">
        <div class="menu-header">
            <span class="menu-title">Menü</span>
            <button class="close-menu" id="closeMenu">✕</button>
        </div>
        <div class="menu-content">
            <div class="menu-item theme-toggle">
                <span class="menu-icon">🌗</span>
                <span>Tema Değiştir</span>
                <div class="theme-buttons">
                    <button class="theme-btn" data-theme="light">Açık</button>
                    <button class="theme-btn" data-theme="dark">Koyu</button>
                </div>
            </div>
            <a href="[instagram.com](https://instagram.com/animiumresmi)" target="_blank" class="menu-item instagram-link">
                <span class="menu-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
                    </svg>
                </span>
                <span>@animiumresmi takip et</span>
            </a>
        </div>
    </aside>

    <!-- Ana İçerik -->
    <main class="haberler-page">
        <div class="page-header">
            <h1>Tüm Haberler</h1>
            <p class="haber-count-page">Toplam <span id="toplamHaber">0</span> haber</p>
        </div>

        <div class="haberler-grid" id="haberlerGrid">
            <!-- JS ile doldurulacak -->
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination">
            <!-- JS ile doldurulacak -->
        </div>
    </main>

    <!-- Haber Detay Modal -->
    <div class="detail-modal" id="detailModal">
        <div class="detail-content">
            <button class="close-detail" id="closeDetail">✕</button>
            <div class="detail-image">
                <img id="detailImage" src="" alt="">
            </div>
            <div class="detail-body">
                <div class="detail-meta">
                    <img src="https://i.pinimg.com/736x/25/16/26/251626449a9effd2ca0423f8dfc32981.jpg" alt="Admin" class="admin-avatar">
                    <span class="admin-name">Sinloschen tarafından eklendi</span>
                </div>
                <h2 id="detailTitle"></h2>
                <span class="detail-category" id="detailCategory"></span>
                <span class="detail-date" id="detailDate"></span>
                <div class="detail-text" id="detailText"></div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <span class="footer-logo">ANIMIUM</span>
            <p>© 2026 Animium - Tüm hakları saklıdır</p>
        </div>
    </footer>

    <script src="data.js"></script>
    <script src="haberler.js"></script>
</body>
</html>
